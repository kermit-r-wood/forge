name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build Executable
        run: uv run scripts/build_executable.py

      - name: Archive Production Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          powershell Compress-Archive -Path dist/Forge -DestinationPath Forge-Windows.zip

      - name: Archive Production Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -czvf Forge-Linux.tar.gz -C dist Forge

      - name: Archive Production Artifacts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          tar -czvf Forge-macOS.tar.gz -C dist Forge

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forge-${{ matrix.os }}
          path: |
            Forge-*.zip
            Forge-*.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/forge-windows-latest/*.zip
            artifacts/forge-ubuntu-latest/*.tar.gz
            artifacts/forge-macos-latest/*.tar.gz
          generate_release_notes: true
